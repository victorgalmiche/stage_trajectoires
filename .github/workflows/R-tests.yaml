name: R tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.6.0"
          use-public-rspm: true

      - name: Setup renv
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 2

      - name: Restore renv
        shell: Rscript {0}
        run: renv::restore()

      - name: Run tests
        shell: Rscript {0}
        run: |
          testthat::test_dir("tests/testthat")
